<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversational CRM — 3 分鐘儀式</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c14;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-focus: rgba(99,179,237,0.5);
      --text: #e2e8f0;
      --text-muted: #718096;
      --accent: #63b3ed;
      --accent-glow: rgba(99,179,237,0.15);
      --success: #68d391;
      --success-bg: rgba(104,211,145,0.08);
      --warning: #f6ad55;
      --warning-bg: rgba(246,173,85,0.10);
      --error: #fc8181;
      --error-bg: rgba(252,129,129,0.10);
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,179,237,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(154,117,234,0.05) 0%, transparent 60%);
    }
    .container { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { font-size: 22px; font-weight: 600; color: var(--accent); letter-spacing: -0.3px; }
    .header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ── Panel system ── */
    .panel { display: none; width: 100%; max-width: 720px; }
    .panel.active { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; margin-bottom: 16px;
    }
    .card-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

    /* ── Textarea ── */
    textarea {
      width: 100%; min-height: 160px; background: rgba(255,255,255,0.03);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.7; padding: 14px;
      resize: vertical; outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--border-focus); }
    textarea::placeholder { color: var(--text-muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500;
      cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #080c14; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface-hover); }
    .btn-danger { background: var(--error-bg); color: var(--error); border: 1px solid rgba(252,129,129,0.2); }
    .btn-danger:hover { background: rgba(252,129,129,0.2); }
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Banners ── */
    .banner {
      border-radius: 8px; padding: 12px 16px; margin-bottom: 16px;
      font-size: 13px; display: flex; align-items: flex-start; gap: 10px;
    }
    .banner-warning { background: var(--warning-bg); border: 1px solid rgba(246,173,85,0.25); color: var(--warning); }
    .banner-error   { background: var(--error-bg);   border: 1px solid rgba(252,129,129,0.25); color: var(--error); }
    .banner-success { background: var(--success-bg); border: 1px solid rgba(104,211,145,0.25); color: var(--success); }
    .banner-icon { font-size: 16px; flex-shrink: 0; }

    /* ── Entity match tags ── */
    .entity-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 500; margin: 4px 0;
    }
    .entity-tag.matched   { background: rgba(104,211,145,0.12); color: var(--success); border: 1px solid rgba(104,211,145,0.25); }
    .entity-tag.uncertain { background: var(--warning-bg);       color: var(--warning); border: 1px solid rgba(246,173,85,0.25); }
    .entity-tag.new       { background: var(--surface);          color: var(--text-muted); border: 1px solid var(--border); }

    /* ── Intent summary cards ── */
    .intent-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
      background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(99,179,237,0.2);
    }
    .field-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
    .field-label { font-size: 12px; color: var(--text-muted); min-width: 80px; flex-shrink: 0; }
    .field-value { font-size: 13px; color: var(--text); }
    .field-value.editable-input {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 8px; color: var(--text); font-size: 13px; flex: 1; outline: none;
      transition: border-color 0.15s;
    }
    .field-value.editable-input:focus { border-color: var(--border-focus); }

    /* ── Confidence meter ── */
    .confidence-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 6px; }
    .confidence-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

    /* ── Loading spinner ── */
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { text-align: center; color: var(--text-muted); font-size: 14px; }

    /* ── Result / Error center layout ── */
    .center-panel { text-align: center; padding: 40px 20px; }
    .center-panel .icon { font-size: 48px; margin-bottom: 16px; }
    .center-panel h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .center-panel p  { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }

    /* ── Disambiguation confirm ── */
    .disambig-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 8px 0; }
    .disambig-row .entity-tag { cursor: default; }

    /* ── Misc ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .text-muted { color: var(--text-muted); font-size: 13px; }
    .confidence-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Conversational CRM</h1>
    <p>3 分鐘儀式 — 解析 · 預覽 · 確認 · 寫入</p>
  </div>

  <!-- ════════════════════════════════════
       PANEL: INPUT
  ════════════════════════════════════ -->
  <div id="panel-INPUT" class="panel active">
    <div class="card">
      <div class="card-title">意識流回報</div>
      <textarea id="input-text" placeholder="今天去拜訪了...&#10;&#10;描述互動細節、案件進度、安排後續任務..."></textarea>
      <div class="btn-group">
        <button class="btn btn-primary" id="btn-parse" onclick="startParse()">⚡ 解析</button>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════
       PANEL: LOADING
  ════════════════════════════════════ -->
  <div id="panel-LOADING" class="panel">
    <div class="card center-panel">
      <div class="spinner"></div>
      <div class="loading-text">AI 解析中，請稍候...</div>
    </div>
  </div>

  <!-- ════════════════════════════════════
       PANEL: PREVIEW
  ════════════════════════════════════ -->
  <div id="panel-PREVIEW" class="panel">
    <div id="preview-banners"></div>
    <div id="preview-confidence-card" class="card">
      <div class="card-title">解析品質</div>
      <div id="preview-confidence-display"></div>
    </div>
    <div id="preview-intents-container"></div>
    <div class="btn-group">
      <button class="btn btn-primary" id="btn-confirm-from-preview" onclick="startConfirm()">✅ 確認寫入</button>
      <button class="btn btn-secondary" onclick="goToEditing()">✏️ 修改</button>
      <button class="btn btn-secondary" onclick="setState('INPUT')">← 重新輸入</button>
    </div>
  </div>

  <!-- ════════════════════════════════════
       PANEL: EDITING
  ════════════════════════════════════ -->
  <div id="panel-EDITING" class="panel">
    <div class="banner banner-warning">
      <span class="banner-icon">✏️</span>
      <span>編輯模式：修改後點「完成，預覽」返回確認。</span>
    </div>
    <div id="editing-intents-container"></div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="finishEditing()">完成，預覽</button>
      <button class="btn btn-secondary" onclick="setState('INPUT')">← 重新輸入</button>
    </div>
  </div>

  <!-- ════════════════════════════════════
       PANEL: CONFIRMING
  ════════════════════════════════════ -->
  <div id="panel-CONFIRMING" class="panel">
    <div class="card center-panel">
      <div class="spinner"></div>
      <div class="loading-text">寫入 Sheets 並發送 Slack 通知...</div>
    </div>
  </div>

  <!-- ════════════════════════════════════
       PANEL: RESULT
  ════════════════════════════════════ -->
  <div id="panel-RESULT" class="panel">
    <div class="card center-panel">
      <div id="result-icon" class="icon">✅</div>
      <h2 id="result-title">已成功寫入</h2>
      <p id="result-message">CRM 資料已更新，Slack 通知已送出。</p>
      <div id="result-retry-btn" style="display:none; margin-bottom:16px;">
        <button class="btn btn-danger" onclick="retrySlackNotification()">🔁 重試 Slack 通知</button>
      </div>
      <button class="btn btn-primary" onclick="resetToInput()">✨ 繼續輸入</button>
    </div>
  </div>

  <!-- ════════════════════════════════════
       PANEL: ERROR
  ════════════════════════════════════ -->
  <div id="panel-ERROR" class="panel">
    <div class="card center-panel">
      <div class="icon">❌</div>
      <h2>發生錯誤</h2>
      <p id="error-message">未知錯誤</p>
      <div class="btn-group" style="justify-content:center;">
        <button class="btn btn-primary" id="btn-retry-error" onclick="retryLastAction()">🔁 重試</button>
        <button class="btn btn-secondary" onclick="resetToInput()">← 返回輸入</button>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════
// App State
// ════════════════════════════════════
const STATES = ['INPUT','LOADING','PREVIEW','EDITING','CONFIRMING','RESULT','ERROR'];

const appState = {
  currentState: 'INPUT',
  rawText: '',
  nluResult: null,        // parseOnly 回傳的 data
  editedResult: null,     // 使用者在 EDITING 修改後的資料
  editLog: [],            // [{field, original, modified}]
  lastAction: null,       // 'parse' | 'confirm'（用於錯誤重試）
  pendingSlackActions: [] // 待重試的 Slack actions
};

function setState(newState) {
  STATES.forEach(s => {
    const el = document.getElementById('panel-' + s);
    if (el) el.classList.remove('active');
  });
  const target = document.getElementById('panel-' + newState);
  if (target) target.classList.add('active');
  appState.currentState = newState;
}

// ════════════════════════════════════
// INPUT → LOADING → PREVIEW
// ════════════════════════════════════
function startParse() {
  const text = document.getElementById('input-text').value.trim();
  if (!text) { alert('請輸入回報內容'); return; }
  appState.rawText = text;
  appState.editLog = [];
  appState.lastAction = 'parse';
  setState('LOADING');

  google.script.run
    .withSuccessHandler(function(result) {
      if (result.status === 'error') {
        showError(result.message, 'parse');
        return;
      }
      appState.nluResult = result.data;
      appState.editedResult = JSON.parse(JSON.stringify(result.data)); // deep copy
      renderPreview(result.data);

      // overall_confidence < 0.50 → 自動進入 EDITING
      if ((result.data.overall_confidence || 0) < 0.50) {
        setState('PREVIEW');
        goToEditing();
      } else {
        setState('PREVIEW');
      }
    })
    .withFailureHandler(function(err) {
      showError(err.message || '連線錯誤', 'parse');
    })
    .parseOnly(text);
}

// ════════════════════════════════════
// PREVIEW rendering
// ════════════════════════════════════
function renderPreview(data) {
  // Confidence
  const conf = data.overall_confidence || 0;
  const confPct = Math.round(conf * 100);
  const confColor = conf >= 0.8 ? '#68d391' : conf >= 0.5 ? '#f6ad55' : '#fc8181';
  document.getElementById('preview-confidence-display').innerHTML =
    '<div class="field-row"><span class="field-label">整體信心</span><span class="field-value">' + confPct + '%</span></div>' +
    '<div class="confidence-bar"><div class="confidence-fill" style="width:' + confPct + '%;background:' + confColor + '"></div></div>';

  // Banners
  const bannersEl = document.getElementById('preview-banners');
  bannersEl.innerHTML = '';
  if (conf < 0.50) {
    bannersEl.innerHTML += '<div class="banner banner-error"><span class="banner-icon">⚠️</span><span>AI 解析信心不足（' + confPct + '%），建議手動確認各欄位。</span></div>';
  }
  if (data.missing_fields && data.missing_fields.length > 0) {
    bannersEl.innerHTML += '<div class="banner banner-warning"><span class="banner-icon">📋</span><span>以下欄位需補填：' + data.missing_fields.join('、') + '</span></div>';
  }

  // Intent cards
  const container = document.getElementById('preview-intents-container');
  container.innerHTML = '';
  (data.intents || []).forEach(intent => {
    container.innerHTML += buildIntentCard(intent, data, false);
  });
}

function buildIntentCard(intent, data, editable) {
  const labelMap = {
    CREATE_ENTITY: '建立客戶',
    UPDATE_PIPELINE: '更新案件',
    LOG_INTERACTION: '互動紀錄',
    SCHEDULE_ACTION: '排程任務'
  };
  let content = '<div class="intent-badge">' + (labelMap[intent] || intent) + '</div>';

  if (intent === 'CREATE_ENTITY') {
    (data.entities || []).forEach((e, i) => {
      content += buildEntityBlock(e, i, editable);
    });
  } else if (intent === 'UPDATE_PIPELINE') {
    (data.pipelines || []).forEach((p, i) => {
      content += buildFieldRows([
        ['客戶', p.entity_name, 'pipelines.' + i + '.entity_name', editable],
        ['階段', p.stage, 'pipelines.' + i + '.stage', editable],
        ['估值', p.est_value != null ? p.est_value : '—', 'pipelines.' + i + '.est_value', editable],
        ['下次跟進', p.next_action_date || '—', 'pipelines.' + i + '.next_action_date', editable],
        ['現況摘要', p.status_summary || '—', 'pipelines.' + i + '.status_summary', editable]
      ]);
    });
  } else if (intent === 'LOG_INTERACTION') {
    (data.interactions || []).forEach((it, i) => {
      content += buildFieldRows([
        ['客戶', it.entity_name, 'interactions.' + i + '.entity_name', editable],
        ['情緒', it.sentiment || '—', 'interactions.' + i + '.sentiment', editable],
        ['洞察', (it.ai_key_insights || []).join(' / '), 'interactions.' + i + '.ai_key_insights', false]
      ]);
    });
  } else if (intent === 'SCHEDULE_ACTION') {
    (data.actions || []).forEach((a, i) => {
      content += buildFieldRows([
        ['客戶', a.entity_name, 'actions.' + i + '.entity_name', editable],
        ['任務', a.action_description, 'actions.' + i + '.action_description', editable],
        ['日期', a.action_date, 'actions.' + i + '.action_date', editable]
      ]);
    });
  }

  return '<div class="card">' + content + '</div>';
}

function buildEntityBlock(e, i, editable) {
  let html = buildFieldRows([
    ['名稱', e.name, 'entities.' + i + '.name', editable],
    ['類型', e.category, 'entities.' + i + '.category', false],
    ['產業', e.industry || '—', 'entities.' + i + '.industry', editable]
  ]);

  // Disambiguation banner
  const conf = e.entity_match_confidence || 0;
  if (conf >= 0.80 && e.matched_entity_id) {
    html += '<div class="disambig-row"><span class="entity-tag matched">✓ 已匹配：' + e.matched_entity_id + '</span></div>';
  } else if (conf >= 0.50 && e.matched_entity_id) {
    html += '<div class="disambig-row">' +
      '<span class="entity-tag uncertain">? 可能是既有客戶（' + Math.round(conf * 100) + '%）</span>' +
      '<button class="btn btn-secondary" style="font-size:12px;padding:4px 10px;" onclick="confirmEntityMatch(' + i + ',true)">是</button>' +
      '<button class="btn btn-secondary" style="font-size:12px;padding:4px 10px;" onclick="confirmEntityMatch(' + i + ',false)">否，建立新客戶</button>' +
      '</div>';
  } else {
    html += '<div class="disambig-row"><span class="entity-tag new">+ 新客戶</span></div>';
  }
  return html;
}

function buildFieldRows(rows) {
  return rows.map(([label, value, path, editable]) => {
    if (editable) {
      return '<div class="field-row"><span class="field-label">' + label + '</span>' +
        '<input class="field-value editable-input" data-path="' + path + '" value="' + escHtml(String(value || '')) + '" ' +
        'onchange="onFieldEdit(this)" /></div>';
    }
    return '<div class="field-row"><span class="field-label">' + label + '</span><span class="field-value">' + escHtml(String(value || '')) + '</span></div>';
  }).join('');
}

// ════════════════════════════════════
// EDITING
// ════════════════════════════════════
function goToEditing() {
  const container = document.getElementById('editing-intents-container');
  container.innerHTML = '';
  const data = appState.editedResult;
  (data.intents || []).forEach(intent => {
    container.innerHTML += buildIntentCard(intent, data, true);
  });
  setState('EDITING');
}

function onFieldEdit(inputEl) {
  const path = inputEl.getAttribute('data-path');
  const newVal = inputEl.value;
  const original = getNestedValue(appState.editedResult, path);

  if (String(original) !== newVal) {
    appState.editLog.push({ field: path, original: original, modified: newVal });
    setNestedValue(appState.editedResult, path, newVal);
  }
}

function finishEditing() {
  renderPreview(appState.editedResult);
  setState('PREVIEW');
}

function confirmEntityMatch(entityIndex, isMatch) {
  if (!isMatch) {
    setNestedValue(appState.editedResult, 'entities.' + entityIndex + '.matched_entity_id', null);
    setNestedValue(appState.editedResult, 'entities.' + entityIndex + '.entity_match_confidence', 0);
    appState.editLog.push({ field: 'entities.' + entityIndex + '.matched_entity_id', original: appState.editedResult.entities[entityIndex].matched_entity_id, modified: null });
  }
  renderPreview(appState.editedResult);
}

// ════════════════════════════════════
// CONFIRMING → RESULT / ERROR
// ════════════════════════════════════
function startConfirm() {
  appState.lastAction = 'confirm';
  setState('CONFIRMING');

  const confirmedData = Object.assign({}, appState.editedResult, { edit_log: appState.editLog });

  google.script.run
    .withSuccessHandler(function(result) {
      if (result.status === 'error') {
        showError(result.message, 'confirm');
        return;
      }

      if (result.status === 'partial_success') {
        // Sheets OK，Slack 失敗
        appState.pendingSlackActions = (appState.editedResult.actions || []).map((a, i) => ({
          task_id: (result.written && result.written.actions_scheduled && result.written.actions_scheduled[i]) ? result.written.actions_scheduled[i].task_id : null,
          entity_name: a.entity_name,
          action_description: a.action_description,
          action_date: a.action_date
        }));
        showResult('已寫入（Slack 通知失敗）', '資料已寫入 Sheets，但 Slack 通知未送達。', true);
      } else {
        showResult('已成功寫入', 'CRM 資料已更新，Slack 通知已送出。', false);
      }
    })
    .withFailureHandler(function(err) {
      showError(err.message || '寫入時發生連線錯誤', 'confirm');
    })
    .confirmWrite(confirmedData);
}

function showResult(title, message, showRetry) {
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-message').textContent = message;
  document.getElementById('result-icon').textContent = showRetry ? '⚠️' : '✅';
  document.getElementById('result-retry-btn').style.display = showRetry ? 'block' : 'none';
  setState('RESULT');
}

function retrySlackNotification() {
  const actions = appState.pendingSlackActions;
  if (!actions || actions.length === 0) return;

  google.script.run
    .withSuccessHandler(function(result) {
      if (result.status === 'ok') {
        showResult('已成功寫入', 'Slack 通知重試成功。', false);
      } else {
        alert('重試失敗：' + (result.message || '未知錯誤'));
      }
    })
    .withFailureHandler(function(err) {
      alert('重試失敗：' + (err.message || '連線錯誤'));
    })
    .retrySlack(actions[0]); // 重試第一筆（多筆可擴展）
}

// ════════════════════════════════════
// ERROR
// ════════════════════════════════════
function showError(message, context) {
  document.getElementById('error-message').textContent = message || '未知錯誤';
  appState.lastAction = context;
  setState('ERROR');
}

function retryLastAction() {
  if (appState.lastAction === 'parse') {
    setState('INPUT');
    startParse();
  } else if (appState.lastAction === 'confirm') {
    startConfirm();
  } else {
    resetToInput();
  }
}

function resetToInput() {
  appState.rawText = '';
  appState.nluResult = null;
  appState.editedResult = null;
  appState.editLog = [];
  appState.pendingSlackActions = [];
  document.getElementById('input-text').value = '';
  setState('INPUT');
}

// ════════════════════════════════════
// Helpers
// ════════════════════════════════════
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getNestedValue(obj, path) {
  return path.split('.').reduce((o, k) => (o != null ? o[k] : undefined), obj);
}

function setNestedValue(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const k = parts[i];
    // handle array index
    if (!isNaN(parts[i + 1])) {
      if (!cur[k]) cur[k] = [];
    } else {
      if (!cur[k]) cur[k] = {};
    }
    cur = cur[k];
  }
  cur[parts[parts.length - 1]] = value;
}
